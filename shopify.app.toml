# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "db13fdd2d4ebf003e30f20820cf87ad0"
name = "VelocityApps"
application_url = "https://velocityapps.dev/api/auth/shopify/install"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://velocityapps.dev/api/webhooks/shopify"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_content,read_customers,read_inventory,read_orders,read_products,write_content,write_discounts,write_inventory,write_price_rules,write_products"

[auth]
redirect_urls = [ "https://velocityapps.dev/api/auth/shopify/callback" ]
